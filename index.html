<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASLD Pilot — Arizona State Trust Land Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }

    #stat-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      flex-wrap: wrap;
      height: 48px;
    }
    #stat-bar h1 {
      font-size: 16px;
      font-weight: 700;
      margin-right: 8px;
      white-space: nowrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .stat .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-blue { background: #3b82f6; }
    .dot-amber { background: #f59e0b; }
    .stat-value { font-weight: 700; font-size: 16px; }
    .stat-label { color: #94a3b8; }
    #loading {
      color: #94a3b8;
      font-style: italic;
    }

    #map-container {
      position: relative;
      height: calc(100vh - 48px);
      transition: margin-right 0.3s ease;
    }
    #map-container.drawer-open {
      margin-right: 400px;
    }
    #map { height: 100%; width: 100%; }

    /* Popup styles */
    .leaflet-popup-content {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-width: 240px;
    }
    .popup-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e2e8f0;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .popup-label { color: #64748b; }
    .popup-value { font-weight: 600; text-align: right; max-width: 60%; }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .badge-blue { background: #3b82f6; }
    .badge-amber { background: #f59e0b; }
    .scorecard {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #e2e8f0;
    }
    .scorecard-title {
      font-weight: 700;
      font-size: 12px;
      color: #334155;
      margin-bottom: 4px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
      font-size: 12px;
    }
    .score-label { color: #64748b; }
    .score-pass { color: #16a34a; font-weight: 700; }
    .score-warn { color: #f59e0b; font-weight: 700; }
    .score-fail { color: #dc2626; font-weight: 700; }
    .brief-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 6px 0;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .brief-btn:hover { background: #2d2d4e; }

    /* Drawer */
    #drawer {
      position: fixed;
      right: -400px;
      top: 48px;
      bottom: 0;
      width: 400px;
      background: #fff;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      transition: right 0.3s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }
    #drawer.open { right: 0; }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .drawer-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .drawer-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #64748b;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .drawer-close:hover { background: #f1f5f9; color: #1a1a2e; }
    .drawer-details {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
    }
    .drawer-details .popup-row { padding: 3px 0; }
    .drawer-details .scorecard { margin-top: 12px; padding-top: 10px; }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #334155;
    }
    .drawer-body h3 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 12px 0 4px;
    }
    .drawer-body h3:first-child { margin-top: 0; }
    .drawer-body h4 {
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      margin: 10px 0 4px;
    }
    .drawer-body strong { font-weight: 700; color: #1a1a2e; }
    .drawer-loading {
      color: #64748b;
      font-style: italic;
      padding: 20px 0;
    }
    .drawer-error {
      color: #dc2626;
      padding: 12px 0;
    }
    .drawer-footer {
      padding: 10px 20px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }

    /* Legend */
    .legend {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 13px;
      line-height: 1.6;
    }
    .legend-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      display: inline-block;
      flex-shrink: 0;
    }
    .legend-detail {
      color: #64748b;
      font-size: 11px;
      margin-left: 22px;
    }
    .legend-credit {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #e2e8f0;
      color: #94a3b8;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="stat-bar">
    <h1>ASLD Pilot</h1>
    <span id="loading">Loading parcels…</span>
    <div class="stat" id="stat-unleased" style="display:none">
      <span class="dot dot-blue"></span>
      <span class="stat-value" id="unleased-count">—</span>
      <span class="stat-label">unleased parcels</span>
      <span class="stat-value" id="unleased-acres">—</span>
      <span class="stat-label">acres</span>
    </div>
    <div class="stat" id="stat-expiring" style="display:none">
      <span class="dot dot-amber"></span>
      <span class="stat-value" id="expiring-count">—</span>
      <span class="stat-label">expiring ≤2 yr</span>
      <span class="stat-value" id="expiring-acres">—</span>
      <span class="stat-label">acres</span>
    </div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="loading-overlay" style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: white;
      border-radius: 12px;
      padding: 24px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      text-align: center;
      min-width: 240px;
    ">
      <div style="font-size:14px;font-weight:500;margin-bottom:8px;">
        Loading Trust Parcels
      </div>
      <div id="loading-detail" style="font-size:12px;color:#888;">
        Connecting to ASLD...
      </div>
      <div style="margin-top:12px;height:3px;background:#eee;
        border-radius:2px;overflow:hidden;">
        <div id="loading-bar" style="height:100%;width:0%;
          background:#185FA5;transition:width 0.5s ease;">
        </div>
      </div>
    </div>
  </div>

  <div id="drawer">
    <div class="drawer-header">
      <h2>Parcel Brief</h2>
      <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="drawer-details" id="drawer-details"></div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer">Powered by CityPulse AI</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const PROXY = 'https://asld-proxy.adam-943.workers.dev/?url=';
    const BASE_URL =
      'https://server.azgeo.az.gov/arcgis/rest/services/azland/State_Trust_Parcels/FeatureServer/0/query';
    const ZONING_URL =
      'https://services.arcgis.com/ltPBnW5Gt8VDqPIU/arcgis/rest/services/Zoning/FeatureServer/0/query';
    const BRIEF_URL = 'https://asld-proxy.adam-943.workers.dev/api/brief';

    const FUND_NAMES = {
      24: 'University of Arizona',
      30: 'Common Schools',
      31: 'K-12 Education',
      151: 'University (General)',
      160: 'Normal Schools',
      181: 'State Institutions'
    };

    // Basemaps
    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    });
    const satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      subdomains: ['mt0','mt1','mt2','mt3'],
      attribution: '&copy; Google',
      maxZoom: 20
    });

    const map = L.map('map', { layers: [streets] }).setView([33.6, -112.25], 9);

    const zoningLayer = L.layerGroup().addTo(map);
    const unleasedLayer = L.layerGroup().addTo(map);
    const expiringLayer = L.layerGroup().addTo(map);

    L.control.layers(
      { 'Streets': streets, 'Satellite': satellite },
      {
        'Zoning (gray)': zoningLayer,
        'Unleased (blue)': unleasedLayer,
        'Expiring ≤2yr (amber)': expiringLayer
      }
    ).addTo(map);

    const TWO_YEARS_MS = 2 * 365.25 * 24 * 60 * 60 * 1000;
    const now = Date.now();
    const twoYearsFromNow = now + TWO_YEARS_MS;

    const parcelStore = {};
    let parcelIdCounter = 0;

    function esc(s) {
      if (s == null) return 'N/A';
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function formatDate(epoch) {
      if (!epoch) return 'N/A';
      return new Date(epoch).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function formatAcres(val) {
      if (val == null) return 'N/A';
      return Number(val).toLocaleString('en-US', { maximumFractionDigits: 1 });
    }

    function fundName(code) {
      if (code == null) return 'N/A';
      return FUND_NAMES[code] || 'Fund ' + code;
    }

    function renderMarkdown(text) {
      return text
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h4>$1</h4>')
        .replace(/^# (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }

    function scoreHtml(p, isUnleased) {
      const acres = p.acres || 0;
      const sizePass = acres >= 40;
      const isK12 = p.fund === 31;
      const sizeIcon = sizePass ? '<span class="score-pass">&#10003;</span>' : '<span class="score-warn">&#10007;</span>';
      const k12Icon = isK12 ? '<span class="score-pass">&#10003;</span>' : '<span class="score-fail">&#10007;</span>';
      const availIcon = isUnleased ? '<span class="score-pass">&#10003;</span>' : '<span class="score-warn">&#10007;</span>';
      return `
        <div class="scorecard">
          <div class="scorecard-title">Readiness Score</div>
          <div class="score-row"><span class="score-label">Size threshold (40ac+)</span>${sizeIcon}</div>
          <div class="score-row"><span class="score-label">K-12 Priority fund</span>${k12Icon}</div>
          <div class="score-row"><span class="score-label">Available now</span>${availIcon}</div>
        </div>`;
    }

    function makePopup(p, type) {
      const badgeClass = type === 'unleased' ? 'badge-blue' : 'badge-amber';
      const badgeText = type === 'unleased' ? 'Unleased' : 'Expiring ≤2yr';
      const isUnleased = type === 'unleased';
      const pid = parcelIdCounter++;
      parcelStore[pid] = { props: p, type };

      return `
        <div>
          <div class="popup-title">
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Acres</span>
            <span class="popup-value">${formatAcres(p.acres)}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Beneficiary Fund</span>
            <span class="popup-value">${esc(fundName(p.fund))}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Legal Description</span>
            <span class="popup-value">${esc(p.legaldescription)}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Lease Expiry</span>
            <span class="popup-value">${formatDate(p.expire_date__c)}</span>
          </div>
          ${scoreHtml(p, isUnleased)}
          <button class="brief-btn" onclick="generateBrief(${pid})">Generate Brief</button>
        </div>`;
    }

    // Drawer management
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('map-container').classList.add('drawer-open');
      setTimeout(() => map.invalidateSize(), 350);
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('map-container').classList.remove('drawer-open');
      setTimeout(() => map.invalidateSize(), 350);
    }

    async function generateBrief(pid) {
      const { props: p, type } = parcelStore[pid];
      const isUnleased = type === 'unleased';
      const details = document.getElementById('drawer-details');
      const body = document.getElementById('drawer-body');

      // Populate drawer details
      details.innerHTML = `
        <div class="popup-row">
          <span class="popup-label">Acres</span>
          <span class="popup-value">${formatAcres(p.acres)}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">Beneficiary Fund</span>
          <span class="popup-value">${esc(fundName(p.fund))}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">Legal Description</span>
          <span class="popup-value">${esc(p.legaldescription)}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">Lease Expiry</span>
          <span class="popup-value">${formatDate(p.expire_date__c)}</span>
        </div>
        ${scoreHtml(p, isUnleased)}`;

      body.innerHTML = '<div class="drawer-loading">Generating brief...</div>';
      openDrawer();

      const leaseStatus = p.ke == null ? 'Unleased' : 'Leased (expires ' + formatDate(p.expire_date__c) + ')';
      const prompt = `You are a land intelligence analyst for the Arizona State Land Department. Generate a concise disposition brief for this Trust parcel.

Parcel Data:
- Acres: ${p.acres || 'Unknown'}
- Beneficiary Fund: ${fundName(p.fund)}
- Legal Description: ${p.legaldescription || 'Unknown'}
- Lease Status: ${leaseStatus}
- County: ${p.county || 'Maricopa'}
- Parcel Type: ${p.parceltype || 'Unknown'}
- Open Status: ${p.openstatus || 'Unknown'}

Write a 3-4 paragraph brief covering:
1. Parcel summary and key characteristics
2. Disposition potential — is this a good candidate for sale or lease?
3. Beneficiary fund impact — how would disposition revenue flow?
4. Recommended next steps

Keep it under 250 words. Be specific to the data provided.`;

      try {
        const resp = await fetch(BRIEF_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await resp.json();
        if (data.error) {
          body.innerHTML = '<div class="drawer-error">Error: ' + esc(data.error.message || JSON.stringify(data.error)) + '</div>';
        } else {
          const text = data.content[0].text;
          body.innerHTML = '<p>' + renderMarkdown(text) + '</p>';
        }
      } catch (err) {
        body.innerHTML = '<div class="drawer-error">Error: ' + esc(err.message) + '</div>';
      }
    }

    function polyStyle(color) {
      return { color, weight: 2.5, fillColor: color, fillOpacity: 0.2 };
    }

    function setProgress(pct, detail) {
      document.getElementById('loading-bar').style.width = pct + '%';
      document.getElementById('loading-detail').textContent = detail;
      console.log(`[progress] ${pct}% — ${detail}`);
    }

    async function fetchAll(label, baseUrl, where, outFields, opts) {
      const useGeom = opts && opts.useGeom;
      const PAGE = 200;
      let allFeatures = [];
      let offset = 0;
      console.log(`[fetchAll] START "${label}" where=${where} useGeom=${!!useGeom}`);
      while (true) {
        let target = baseUrl +
          '?where=' + encodeURIComponent(where) +
          '&outSR=4326' +
          '&outFields=' + encodeURIComponent(outFields) +
          '&returnGeometry=true' +
          '&f=geojson' +
          '&resultOffset=' + offset +
          '&resultRecordCount=' + PAGE;
        if (useGeom) {
          target += '&geometry=-113,33,-111.5,34.2' +
            '&geometryType=esriGeometryEnvelope' +
            '&inSR=4326' +
            '&spatialRel=esriSpatialRelIntersects';
        }
        const proxied = PROXY + encodeURIComponent(target);
        console.log(`[fetchAll] "${label}" offset=${offset} url=${proxied.substring(0, 120)}...`);
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 15000);
          const resp = await fetch(proxied, { signal: controller.signal });
          clearTimeout(timeout);
          console.log(`[fetchAll] "${label}" status=${resp.status}`);
          if (!resp.ok) {
            console.error(`[fetchAll] "${label}" HTTP error ${resp.status}`);
            break;
          }
          const data = await resp.json();
          const count = data.features ? data.features.length : 0;
          console.log(`[fetchAll] "${label}" got ${count} features`);
          if (!data.features || count === 0) break;
          allFeatures = allFeatures.concat(data.features);
          if (count < PAGE) break;
          offset += PAGE;
        } catch (err) {
          console.error(`[fetchAll] "${label}" FAILED:`, err.name === 'AbortError' ? 'Request timed out (15s)' : err);
          break;
        }
      }
      console.log(`[fetchAll] DONE "${label}" total=${allFeatures.length}`);
      return allFeatures;
    }

    const TRUST_FIELDS = 'objectid,name,acres,gisacres,county,ke,fund,parceltype,legaldescription,openstatus,expire_date__c,effective_date__c';
    const ZONING_FIELDS = 'ZONE_DESC,ZONE_CLASS';

    function buildLegend(unleasedCount, unleasedAcres, expiringCount, expiringAcres) {
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
          <div class="legend-title">State Trust Parcels</div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:#3b82f6;"></span>
            Unleased Trust Land
          </div>
          <div class="legend-detail">${unleasedCount.toLocaleString()} parcels · ${formatAcres(unleasedAcres)} acres</div>
          <div class="legend-item" style="margin-top:4px;">
            <span class="legend-swatch" style="background:#f59e0b;"></span>
            Lease Expiring &lt;2yr
          </div>
          <div class="legend-detail">${expiringCount.toLocaleString()} parcels · ${formatAcres(expiringAcres)} acres</div>
          <div class="legend-item" style="margin-top:4px;">
            <span class="legend-swatch" style="background:#d1d5db; border:1px solid #9ca3af;"></span>
            County Zoning
          </div>
          <div class="legend-credit">CityPulse — Civic Intelligence Platform</div>
        `;
        return div;
      };
      legend.addTo(map);
    }

    async function load() {
      try {
        setProgress(10, 'Connecting to ASLD...');

        setProgress(20, 'Loading unleased parcels...');
        const unleasedFeatures = await fetchAll('unleased', BASE_URL, 'ke IS NULL AND county=7', TRUST_FIELDS);

        setProgress(40, 'Loading unleased parcels... ' + unleasedFeatures.length + ' found');
        let unleasedAcres = 0;
        unleasedFeatures.forEach(f => {
          const p = f.properties;
          unleasedAcres += (p.acres || 0);
          L.geoJSON(f, { style: polyStyle('#3b82f6') })
            .bindPopup(makePopup(p, 'unleased'))
            .addTo(unleasedLayer);
        });

        setProgress(50, 'Loading expiring leases...');
        const allLeasedFeatures = await fetchAll('expiring', BASE_URL,
          `ke IS NOT NULL AND county=7 AND expire_date__c IS NOT NULL AND expire_date__c <= ${twoYearsFromNow}`, TRUST_FIELDS);

        setProgress(70, 'Loading expiring leases... ' + allLeasedFeatures.length + ' found');
        let expiringAcres = 0;
        allLeasedFeatures.forEach(f => {
          const p = f.properties;
          expiringAcres += (p.acres || 0);
          L.geoJSON(f, { style: polyStyle('#f59e0b') })
            .bindPopup(makePopup(p, 'expiring'))
            .addTo(expiringLayer);
        });

        setProgress(80, 'Loading zoning layer...');
        const zoningFeatures = await fetchAll('zoning', ZONING_URL, '1=1', ZONING_FIELDS, { useGeom: true });

        setProgress(90, 'Rendering zoning... ' + zoningFeatures.length + ' zones');
        zoningFeatures.forEach(f => {
          const p = f.properties;
          L.geoJSON(f, {
            style: { color: '#9ca3af', weight: 0.5, fillColor: '#d1d5db', fillOpacity: 0.08 }
          })
            .bindPopup(`<b>${esc(p.ZONE_CLASS)}</b><br>${esc(p.ZONE_DESC)}`)
            .addTo(zoningLayer);
        });

        setProgress(100, 'Complete');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('stat-unleased').style.display = 'flex';
        document.getElementById('stat-expiring').style.display = 'flex';

        document.getElementById('unleased-count').textContent =
          unleasedFeatures.length.toLocaleString();
        document.getElementById('unleased-acres').textContent =
          formatAcres(unleasedAcres);
        document.getElementById('expiring-count').textContent =
          allLeasedFeatures.length.toLocaleString();
        document.getElementById('expiring-acres').textContent =
          formatAcres(expiringAcres);

        buildLegend(unleasedFeatures.length, unleasedAcres, allLeasedFeatures.length, expiringAcres);

        setTimeout(() => {
          document.getElementById('loading-overlay').style.display = 'none';
        }, 600);

      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading data — ' + err.message;
        document.getElementById('loading-detail').textContent = 'Error: ' + err.message;
        document.getElementById('loading-bar').style.background = '#dc2626';
        console.error('[load] FAILED:', err);
      }
    }

    load();
  </script>
</body>
</html>
