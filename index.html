<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASLD Pilot — Arizona State Trust Land Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }

    #stat-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      flex-wrap: wrap;
    }
    #stat-bar h1 {
      font-size: 16px;
      font-weight: 700;
      margin-right: 8px;
      white-space: nowrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .stat .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-blue { background: #3b82f6; }
    .dot-amber { background: #f59e0b; }
    .stat-value { font-weight: 700; font-size: 16px; }
    .stat-label { color: #94a3b8; }
    #loading {
      color: #94a3b8;
      font-style: italic;
    }

    #map { height: calc(100vh - 48px); width: 100%; }

    .leaflet-popup-content {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-width: 240px;
    }
    .popup-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e2e8f0;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .popup-label { color: #64748b; }
    .popup-value { font-weight: 600; text-align: right; max-width: 60%; }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .badge-blue { background: #3b82f6; }
    .badge-amber { background: #f59e0b; }

    .scorecard {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #e2e8f0;
    }
    .scorecard-title {
      font-weight: 700;
      font-size: 12px;
      color: #334155;
      margin-bottom: 4px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
      font-size: 12px;
    }
    .score-label { color: #64748b; }
    .score-pass { color: #16a34a; font-weight: 700; }
    .score-warn { color: #f59e0b; font-weight: 700; }
    .score-fail { color: #dc2626; font-weight: 700; }

    .legend {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 13px;
      line-height: 1.6;
    }
    .legend-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      display: inline-block;
      flex-shrink: 0;
    }
    .legend-detail {
      color: #64748b;
      font-size: 11px;
      margin-left: 22px;
    }
    .legend-credit {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #e2e8f0;
      color: #94a3b8;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="stat-bar">
    <h1>ASLD Pilot</h1>
    <span id="loading">Loading parcels…</span>
    <div class="stat" id="stat-unleased" style="display:none">
      <span class="dot dot-blue"></span>
      <span class="stat-value" id="unleased-count">—</span>
      <span class="stat-label">unleased parcels</span>
      <span class="stat-value" id="unleased-acres">—</span>
      <span class="stat-label">acres</span>
    </div>
    <div class="stat" id="stat-expiring" style="display:none">
      <span class="dot dot-amber"></span>
      <span class="stat-value" id="expiring-count">—</span>
      <span class="stat-label">expiring ≤2 yr</span>
      <span class="stat-value" id="expiring-acres">—</span>
      <span class="stat-label">acres</span>
    </div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const PROXY = 'https://asld-proxy.adam-943.workers.dev/?url=';
    const BASE_URL =
      'https://server.azgeo.az.gov/arcgis/rest/services/azland/State_Trust_Parcels/FeatureServer/0/query';
    const ZONING_URL =
      'https://services.arcgis.com/ltPBnW5Gt8VDqPIU/arcgis/rest/services/Zoning/FeatureServer/0/query';

    const FUND_NAMES = {
      24: 'University of Arizona',
      30: 'Common Schools',
      31: 'K-12 Education',
      151: 'University (General)',
      160: 'Normal Schools',
      181: 'State Institutions'
    };

    // Basemaps
    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    });
    const satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      subdomains: ['mt0','mt1','mt2','mt3'],
      attribution: '&copy; Google',
      maxZoom: 20
    });

    const map = L.map('map', { layers: [streets] }).setView([33.6, -112.25], 9);

    const zoningLayer = L.layerGroup().addTo(map);
    const unleasedLayer = L.layerGroup().addTo(map);
    const expiringLayer = L.layerGroup().addTo(map);

    // Basemap switcher + overlay toggles
    L.control.layers(
      { 'Streets': streets, 'Satellite': satellite },
      {
        'Zoning (gray)': zoningLayer,
        'Unleased (blue)': unleasedLayer,
        'Expiring ≤2yr (amber)': expiringLayer
      }
    ).addTo(map);

    const TWO_YEARS_MS = 2 * 365.25 * 24 * 60 * 60 * 1000;
    const now = Date.now();
    const twoYearsFromNow = now + TWO_YEARS_MS;

    function formatDate(epoch) {
      if (!epoch) return 'N/A';
      return new Date(epoch).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function formatAcres(val) {
      if (val == null) return 'N/A';
      return Number(val).toLocaleString('en-US', { maximumFractionDigits: 1 });
    }

    function fundName(code) {
      if (code == null) return 'N/A';
      return FUND_NAMES[code] || 'Fund ' + code;
    }

    function makePopup(p, type) {
      const badgeClass = type === 'unleased' ? 'badge-blue' : 'badge-amber';
      const badgeText = type === 'unleased' ? 'Unleased' : 'Expiring ≤2yr';
      const isUnleased = type === 'unleased';

      // FYP scoring
      const acres = p.acres || 0;
      const sizePass = acres >= 40;
      const isK12 = p.fund === 31;
      const sizeIcon = sizePass ? '<span class="score-pass">&#10003;</span>' : '<span class="score-warn">&#10007;</span>';
      const k12Icon = isK12 ? '<span class="score-pass">&#10003;</span>' : '<span class="score-fail">&#10007;</span>';
      const availIcon = isUnleased ? '<span class="score-pass">&#10003;</span>' : '<span class="score-warn">&#10007;</span>';

      return `
        <div>
          <div class="popup-title">
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Acres</span>
            <span class="popup-value">${formatAcres(p.acres)}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Beneficiary Fund</span>
            <span class="popup-value">${fundName(p.fund)}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Legal Description</span>
            <span class="popup-value">${p.legaldescription || 'N/A'}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">Lease Expiry</span>
            <span class="popup-value">${formatDate(p.expire_date__c)}</span>
          </div>
          <div class="scorecard">
            <div class="scorecard-title">Readiness Score</div>
            <div class="score-row">
              <span class="score-label">Size threshold (40ac+)</span>
              ${sizeIcon}
            </div>
            <div class="score-row">
              <span class="score-label">K-12 Priority fund</span>
              ${k12Icon}
            </div>
            <div class="score-row">
              <span class="score-label">Available now</span>
              ${availIcon}
            </div>
          </div>
        </div>`;
    }

    function polyStyle(color) {
      return { color, weight: 2.5, fillColor: color, fillOpacity: 0.2 };
    }

    async function fetchAll(baseUrl, where, outFields) {
      let allFeatures = [];
      let offset = 0;
      while (true) {
        const target = baseUrl +
          '?where=' + encodeURIComponent(where) +
          '&geometry=-113,33,-111.5,34.2' +
          '&geometryType=esriGeometryEnvelope' +
          '&inSR=4326' +
          '&spatialRel=esriSpatialRelIntersects' +
          '&outSR=4326' +
          '&outFields=' + encodeURIComponent(outFields) +
          '&returnGeometry=true' +
          '&f=geojson' +
          '&resultOffset=' + offset +
          '&resultRecordCount=1000';
        const proxied = PROXY + encodeURIComponent(target);
        console.log('Fetching:', proxied);
        const resp = await fetch(proxied);
        const data = await resp.json();
        if (!data.features || data.features.length === 0) break;
        allFeatures = allFeatures.concat(data.features);
        if (data.features.length < 1000) break;
        offset += 1000;
      }
      return allFeatures;
    }

    const TRUST_FIELDS = 'objectid,name,acres,gisacres,county,ke,fund,parceltype,legaldescription,openstatus,expire_date__c,effective_date__c';
    const ZONING_FIELDS = 'ZONE_DESC,ZONE_CLASS';

    function buildLegend(unleasedCount, unleasedAcres, expiringCount, expiringAcres) {
      const legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
          <div class="legend-title">State Trust Parcels</div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:#3b82f6;"></span>
            Unleased Trust Land
          </div>
          <div class="legend-detail">${unleasedCount.toLocaleString()} parcels · ${formatAcres(unleasedAcres)} acres</div>
          <div class="legend-item" style="margin-top:4px;">
            <span class="legend-swatch" style="background:#f59e0b;"></span>
            Lease Expiring &lt;2yr
          </div>
          <div class="legend-detail">${expiringCount.toLocaleString()} parcels · ${formatAcres(expiringAcres)} acres</div>
          <div class="legend-item" style="margin-top:4px;">
            <span class="legend-swatch" style="background:#d1d5db; border:1px solid #9ca3af;"></span>
            County Zoning
          </div>
          <div class="legend-credit">CityPulse — Civic Intelligence Platform</div>
        `;
        return div;
      };
      legend.addTo(map);
    }

    async function load() {
      try {
        const [unleasedFeatures, allLeasedFeatures, zoningFeatures] = await Promise.all([
          fetchAll(BASE_URL, 'ke IS NULL', TRUST_FIELDS),
          fetchAll(BASE_URL, `ke IS NOT NULL AND expire_date__c IS NOT NULL AND expire_date__c <= ${twoYearsFromNow}`, TRUST_FIELDS),
          fetchAll(ZONING_URL, '1=1', ZONING_FIELDS)
        ]);

        // Zoning layer (rendered first, underneath trust parcels)
        zoningFeatures.forEach(f => {
          const p = f.properties;
          L.geoJSON(f, {
            style: { color: '#9ca3af', weight: 0.5, fillColor: '#d1d5db', fillOpacity: 0.08 }
          })
            .bindPopup(`<b>${p.ZONE_CLASS || ''}</b><br>${p.ZONE_DESC || ''}`)
            .addTo(zoningLayer);
        });

        let unleasedAcres = 0;
        unleasedFeatures.forEach(f => {
          const p = f.properties;
          unleasedAcres += (p.acres || 0);
          L.geoJSON(f, { style: polyStyle('#3b82f6') })
            .bindPopup(makePopup(p, 'unleased'))
            .addTo(unleasedLayer);
        });

        let expiringAcres = 0;
        allLeasedFeatures.forEach(f => {
          const p = f.properties;
          expiringAcres += (p.acres || 0);
          L.geoJSON(f, { style: polyStyle('#f59e0b') })
            .bindPopup(makePopup(p, 'expiring'))
            .addTo(expiringLayer);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('stat-unleased').style.display = 'flex';
        document.getElementById('stat-expiring').style.display = 'flex';

        document.getElementById('unleased-count').textContent =
          unleasedFeatures.length.toLocaleString();
        document.getElementById('unleased-acres').textContent =
          formatAcres(unleasedAcres);
        document.getElementById('expiring-count').textContent =
          allLeasedFeatures.length.toLocaleString();
        document.getElementById('expiring-acres').textContent =
          formatAcres(expiringAcres);

        buildLegend(unleasedFeatures.length, unleasedAcres, allLeasedFeatures.length, expiringAcres);

      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading data — ' + err.message;
        console.error(err);
      }
    }

    load();
  </script>
</body>
</html>
