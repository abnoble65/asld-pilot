<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASLD Pilot — Arizona State Trust Land Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }

    #stat-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      flex-wrap: wrap;
      height: 48px;
    }
    #stat-bar h1 { font-size: 16px; font-weight: 700; margin-right: 8px; white-space: nowrap; }
    .stat { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .stat .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-blue { background: #3b82f6; }
    .dot-amber { background: #f59e0b; }
    .stat-value { font-weight: 700; font-size: 16px; }
    .stat-label { color: #94a3b8; }
    #loading { color: #94a3b8; font-style: italic; }

    #map-container {
      position: relative;
      height: calc(100vh - 48px);
      transition: margin-right 0.3s ease, margin-left 0.3s ease;
    }
    #map-container.drawer-open { margin-right: 400px; }
    #map-container.sidebar-open { margin-left: 300px; }
    #map { height: 100%; width: 100%; }

    /* Popup */
    .leaflet-popup-content { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; line-height: 1.5; min-width: 260px; }
    .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .popup-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .popup-label { color: #64748b; }
    .popup-value { font-weight: 600; text-align: right; max-width: 60%; }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; }
    .badge-blue { background: #3b82f6; }
    .badge-amber { background: #f59e0b; }
    .badge-orange { background: #FF6B35; }
    .badge-red { background: #dc2626; }
    .scorecard { margin-top: 8px; padding-top: 6px; border-top: 1px solid #e2e8f0; }
    .scorecard-title { font-weight: 700; font-size: 12px; color: #334155; margin-bottom: 4px; }
    .score-row { display: flex; justify-content: space-between; padding: 1px 0; font-size: 12px; }
    .score-label { color: #64748b; }
    .score-pass { color: #16a34a; font-weight: 700; }
    .score-warn { color: #f59e0b; font-weight: 700; }
    .score-fail { color: #dc2626; font-weight: 700; }
    .score-checking { color: #94a3b8; font-style: italic; font-size: 11px; }
    .score-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; color: #fff; margin-top: 6px; }
    .score-badge-green { background: #16a34a; }
    .score-badge-amber { background: #f59e0b; }
    .score-badge-red { background: #dc2626; }
    .brief-btn { display: block; width: 100%; margin-top: 8px; padding: 6px 0; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .brief-btn:hover { background: #2d2d4e; }

    /* Drawer */
    #drawer { position: fixed; right: -400px; top: 48px; bottom: 0; width: 400px; background: #fff; box-shadow: -2px 0 8px rgba(0,0,0,0.15); transition: right 0.3s ease; z-index: 1000; display: flex; flex-direction: column; }
    #drawer.open { right: 0; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 12px; border-bottom: 1px solid #e2e8f0; }
    .drawer-header h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .drawer-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; padding: 4px 8px; border-radius: 4px; }
    .drawer-close:hover { background: #f1f5f9; color: #1a1a2e; }
    .drawer-details { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    .drawer-details .popup-row { padding: 3px 0; }
    .drawer-details .scorecard { margin-top: 12px; padding-top: 10px; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; font-size: 14px; line-height: 1.7; color: #334155; }
    .drawer-body h3 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin: 12px 0 4px; }
    .drawer-body h3:first-child { margin-top: 0; }
    .drawer-body h4 { font-size: 14px; font-weight: 700; color: #334155; margin: 10px 0 4px; }
    .drawer-body strong { font-weight: 700; color: #1a1a2e; }
    .drawer-loading { color: #64748b; font-style: italic; padding: 20px 0; }
    .drawer-error { color: #dc2626; padding: 12px 0; }
    .drawer-footer { padding: 10px 20px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; text-align: center; }

    /* Sidebar */
    #sidebar { position: fixed; left: -300px; top: 48px; bottom: 0; width: 300px; background: #fff; box-shadow: 2px 0 8px rgba(0,0,0,0.1); transition: left 0.3s ease; z-index: 1000; display: flex; flex-direction: column; }
    #sidebar.open { left: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px 8px; border-bottom: 1px solid #e2e8f0; }
    .sidebar-header h2 { font-size: 14px; font-weight: 700; color: #1a1a2e; }
    .sidebar-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #64748b; padding: 2px 6px; border-radius: 4px; }
    .sidebar-close:hover { background: #f1f5f9; }
    .sidebar-controls { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; }
    .sidebar-search { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; outline: none; }
    .sidebar-search:focus { border-color: #3b82f6; }
    .sidebar-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sidebar-filters label { font-size: 11px; color: #64748b; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-filters select, .sidebar-filters input[type=range] { font-size: 11px; padding: 2px 4px; border: 1px solid #d1d5db; border-radius: 4px; }
    .sidebar-score-btns { display: flex; gap: 4px; margin-top: 6px; }
    .sidebar-score-btn { padding: 3px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; cursor: pointer; background: #fff; color: #334155; }
    .sidebar-score-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .sidebar-count { padding: 6px 14px; font-size: 11px; color: #64748b; border-bottom: 1px solid #f1f5f9; }
    .sidebar-list { flex: 1; overflow-y: auto; }
    .sidebar-item { display: flex; align-items: stretch; gap: 0; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 12px; }
    .sidebar-item:nth-child(even) { background: #f8fafc; }
    .sidebar-item:hover { background: #eef2ff; }
    .sidebar-item-bar { width: 4px; flex-shrink: 0; border-radius: 2px 0 0 2px; }
    .sidebar-item-bar-green { background: #16a34a; }
    .sidebar-item-bar-amber { background: #f59e0b; }
    .sidebar-item-bar-red { background: #dc2626; }
    .sidebar-item-body { display: flex; align-items: center; gap: 10px; padding: 8px 10px; flex: 1; min-width: 0; }
    .sidebar-item-score { flex-shrink: 0; }
    .sidebar-item-info { flex: 1; min-width: 0; }
    .sidebar-item-acres { font-weight: 700; font-size: 14px; color: #1a1a2e; }
    .sidebar-item-fund { color: #64748b; font-size: 11px; }
    .sidebar-item-legal { color: #94a3b8; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-item-fly { flex-shrink: 0; background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px; color: #64748b; }
    .sidebar-item-fly:hover { color: #3b82f6; }
    .sidebar-toggle { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 1001; background: #1a1a2e; color: #fff; border: none; border-radius: 0 6px 6px 0; padding: 12px 6px; cursor: pointer; font-size: 14px; box-shadow: 2px 0 6px rgba(0,0,0,0.15); transition: left 0.3s ease; }
    .sidebar-toggle.shifted { left: 300px; }
    .sidebar-toggle:hover { background: #2d2d4e; }
    .dot-red { background: #dc2626; }
    .priority-queue { border-bottom: 1px solid #e2e8f0; }
    .priority-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px 6px; }
    .priority-header h3 { font-size: 12px; font-weight: 700; color: #1a1a2e; }
    .priority-badge { background: #dc2626; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
    .priority-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
    .priority-item:hover { background: #fff5f5; }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .priority-info { flex: 1; min-width: 0; }
    .priority-expiry { font-weight: 700; }
    .priority-meta { color: #64748b; font-size: 10px; }
    .priority-fly { background: none; border: none; cursor: pointer; font-size: 12px; color: #64748b; padding: 2px; }
    .priority-fly:hover { color: #3b82f6; }
    .sidebar-tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
    .sidebar-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; color: #64748b; border-bottom: 2px solid transparent; }
    .sidebar-tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }
    .sidebar-tab:hover { background: #f8fafc; }

    /* Legend */
    .legend { background: #fff; border-radius: 8px; padding: 12px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 13px; line-height: 1.6; }
    .legend-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
    .legend-detail { color: #64748b; font-size: 11px; margin-left: 22px; }
    .legend-credit { margin-top: 8px; padding-top: 6px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 10px; }
  </style>
</head>
<body>
  <div id="stat-bar">
    <h1>ASLD Pilot</h1>
    <span id="loading">Loading parcels…</span>
    <div class="stat" id="stat-unleased" style="display:none">
      <span class="dot dot-blue"></span>
      <span class="stat-value" id="unleased-count">—</span>
      <span class="stat-label">unleased parcels</span>
      <span class="stat-value" id="unleased-acres">—</span>
      <span class="stat-label">acres</span>
    </div>
    <div class="stat" id="stat-expiring" style="display:none">
      <span class="dot dot-amber"></span>
      <span class="stat-value" id="expiring-count">—</span>
      <span class="stat-label">expiring ≤2 yr</span>
      <span class="dot dot-red" style="margin-left:12px;"></span>
      <span class="stat-value" id="critical-count" style="color:#ff4444;">—</span>
      <span class="stat-label">critical (&lt;6mo)</span>
    </div>
  </div>

  <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>

  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Parcels by Readiness</h2>
      <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="setTypeFilter('unleased',this)">Unleased</button>
      <button class="sidebar-tab" onclick="setTypeFilter('expiring',this)">Expiring ≤2yr</button>
      <button class="sidebar-tab" onclick="setTypeFilter('all',this)">All</button>
    </div>
    <div class="sidebar-controls">
      <input type="text" class="sidebar-search" id="sidebar-search" placeholder="Search legal desc, acres, fund..." oninput="filterSidebar()">
      <div class="sidebar-filters">
        <label>Min acres
          <input type="range" id="filter-acres" min="0" max="1000" value="0" step="10" oninput="this.nextElementSibling.textContent=this.value;filterSidebar()"><span>0</span>
        </label>
        <label>Fund
          <select id="filter-fund" onchange="filterSidebar()">
            <option value="">All Funds</option>
            <option value="31">K-12 Education</option>
            <option value="30">Common Schools</option>
            <option value="24">University of Arizona</option>
            <option value="160">Normal Schools</option>
            <option value="181">State Institutions</option>
            <option value="151">University (General)</option>
          </select>
        </label>
      </div>
      <div class="sidebar-score-btns">
        <button class="sidebar-score-btn active" onclick="setScoreFilter(-1,this)">All</button>
        <button class="sidebar-score-btn" onclick="setScoreFilter(3,this)">3/3</button>
        <button class="sidebar-score-btn" onclick="setScoreFilter(2,this)">2/3</button>
        <button class="sidebar-score-btn" onclick="setScoreFilter(1,this)">1/3</button>
      </div>
    </div>
    <div class="priority-queue" id="priority-queue" style="display:none"></div>
    <div class="sidebar-count" id="sidebar-count"></div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="loading-overlay" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:white;border-radius:12px;padding:24px 32px;box-shadow:0 4px 20px rgba(0,0,0,0.15);text-align:center;min-width:240px;">
      <div style="font-size:14px;font-weight:500;margin-bottom:8px;">Loading Trust Parcels</div>
      <div id="loading-detail" style="font-size:12px;color:#888;">Connecting to ASLD...</div>
      <div style="margin-top:12px;height:3px;background:#eee;border-radius:2px;overflow:hidden;">
        <div id="loading-bar" style="height:100%;width:0%;background:#185FA5;transition:width 0.5s ease;"></div>
      </div>
    </div>
  </div>

  <div id="drawer">
    <div class="drawer-header">
      <h2>Parcel Brief</h2>
      <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="drawer-details" id="drawer-details"></div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer">Powered by CityPulse AI</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const PROXY = 'https://asld-proxy.adam-943.workers.dev/?url=';
    const BASE_URL = 'https://server.azgeo.az.gov/arcgis/rest/services/azland/State_Trust_Parcels/FeatureServer/0/query';
    const FEMA_URL = 'https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query';
    const TIGER_URL = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Transportation/MapServer/2/query';
    const EPA_URL = 'https://geodata.epa.gov/arcgis/rest/services/CERCLIS/MapServer/0/query';
    const BRIEF_URL = 'https://asld-proxy.adam-943.workers.dev/api/brief';

    const FUND_NAMES = { 24:'University of Arizona', 30:'Common Schools', 31:'K-12 Education', 151:'University (General)', 160:'Normal Schools', 181:'State Institutions' };

    const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 });
    const satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains: ['mt0','mt1','mt2','mt3'], attribution: '&copy; Google', maxZoom: 20 });

    const map = L.map('map', { layers: [streets] }).setView([33.6, -112.25], 9);
    const unleasedLayer = L.layerGroup().addTo(map);
    const expiringLayer = L.layerGroup().addTo(map);

    L.control.layers(
      { 'Streets': streets, 'Satellite': satellite },
      { 'Unleased (blue)': unleasedLayer, 'Expiring ≤2yr (amber)': expiringLayer }
    ).addTo(map);

    const TWO_YEARS_MS = 2 * 365.25 * 24 * 60 * 60 * 1000;
    const now = Date.now();
    const twoYearsFromNow = now + TWO_YEARS_MS;
    // ArcGIS WHERE clause needs DATE 'YYYY-MM-DD' format, not milliseconds
    const twoYearsDate = new Date(twoYearsFromNow);
    const twoYearsStr = twoYearsDate.getFullYear() + '-' +
      String(twoYearsDate.getMonth() + 1).padStart(2, '0') + '-' +
      String(twoYearsDate.getDate()).padStart(2, '0');
    console.log('[dates] Two years from now:', twoYearsStr, '(' + twoYearsFromNow + 'ms)');

    const parcelStore = {};
    const siteCache = {};
    const parcelLayers = {};
    let parcelIdCounter = 0;

    function esc(s) { if (s == null) return 'N/A'; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatDate(epoch) { if (!epoch) return 'N/A'; return new Date(epoch).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
    function formatAcres(val) { if (val == null) return 'N/A'; return Number(val).toLocaleString('en-US', { maximumFractionDigits: 1 }); }
    function fundName(code) { if (code == null) return 'N/A'; return FUND_NAMES[code] || 'Fund ' + code; }

    const SIX_MONTHS_MS = 6 * 30.44 * 24 * 60 * 60 * 1000;
    const DAY_MS = 24 * 60 * 60 * 1000;

    function daysUntilExpiry(expireMs) {
      if (!expireMs) return null;
      return Math.round((expireMs - now) / DAY_MS);
    }

    function expiryLabel(expireMs) {
      const days = daysUntilExpiry(expireMs);
      if (days === null) return '';
      if (days < 0) return 'Expired ' + Math.abs(days) + ' days ago';
      if (days === 0) return 'Expires today';
      return 'Expires in ' + days + ' days';
    }

    function isCritical(expireMs) {
      if (!expireMs) return false;
      return (expireMs - now) <= SIX_MONTHS_MS;
    }

    function expiryPolyStyle(expireMs) {
      if (isCritical(expireMs)) {
        return { color: '#CC0000', weight: 3, fillColor: '#FF0000', fillOpacity: 0.6 };
      }
      return { color: '#CC4400', weight: 2, fillColor: '#FF6B35', fillOpacity: 0.4 };
    }

    function renderMarkdown(text) {
      return text
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h4>$1</h4>')
        .replace(/^# (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }

    // ── Centroid from GeoJSON geometry ──
    function getCentroid(geometry) {
      if (!geometry || !geometry.coordinates) return null;
      let coords;
      if (geometry.type === 'MultiPolygon') coords = geometry.coordinates.flat(2);
      else if (geometry.type === 'Polygon') coords = geometry.coordinates.flat(1);
      else return null;
      let sLng = 0, sLat = 0;
      coords.forEach(c => { sLng += c[0]; sLat += c[1]; });
      return { lng: sLng / coords.length, lat: sLat / coords.length };
    }

    // ── Proxied point query helper ──
    async function queryPoint(label, baseUrl, centroid, extraParams) {
      const target = baseUrl +
        '?geometry=' + centroid.lng + ',' + centroid.lat +
        '&geometryType=esriGeometryPoint' +
        '&inSR=4326&outSR=4326&spatialRel=esriSpatialRelIntersects' +
        '&returnGeometry=false&f=json' +
        (extraParams || '');
      const proxied = PROXY + encodeURIComponent(target);
      console.log(`[site] ${label} query:`, proxied.substring(0, 120));
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);
      const resp = await fetch(proxied, { signal: controller.signal });
      clearTimeout(timeout);
      return await resp.json();
    }

    // ── Site criteria fetchers ──
    async function fetchFloodZone(centroid) {
      try {
        const data = await queryPoint('FEMA', FEMA_URL, centroid, '&outFields=FLD_ZONE,ZONE_SUBTY');
        if (!data.features || data.features.length === 0) return { status: 'unknown', detail: 'No data' };
        const zone = data.features[0].attributes.FLD_ZONE || '';
        if (zone.startsWith('X')) return { status: 'pass', detail: zone + ' (minimal flood risk)' };
        if (zone.startsWith('A') || zone.startsWith('V')) return { status: 'fail', detail: zone + ' (flood zone)' };
        return { status: 'unknown', detail: zone };
      } catch (e) { console.error('[site] FEMA failed:', e); return { status: 'unknown', detail: 'Query failed' }; }
    }

    async function fetchRoadAccess(centroid) {
      try {
        const target = TIGER_URL +
          '?geometry=' + centroid.lng + ',' + centroid.lat +
          '&geometryType=esriGeometryPoint' +
          '&inSR=4326&outSR=4326&spatialRel=esriSpatialRelIntersects' +
          '&distance=500&units=esriSRUnit_Meter' +
          '&returnGeometry=false&returnCountOnly=true&f=json';
        const proxied = PROXY + encodeURIComponent(target);
        console.log('[site] Roads query:', proxied.substring(0, 120));
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        const resp = await fetch(proxied, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await resp.json();
        const count = data.count || 0;
        if (count > 0) return { status: 'pass', detail: count + ' road(s) within 500m' };
        return { status: 'fail', detail: 'No roads within 500m' };
      } catch (e) { console.error('[site] Roads failed:', e); return { status: 'unknown', detail: 'Query failed' }; }
    }

    async function fetchEPASites(centroid) {
      try {
        const target = EPA_URL +
          '?geometry=' + centroid.lng + ',' + centroid.lat +
          '&geometryType=esriGeometryPoint' +
          '&inSR=4326&outSR=4326&spatialRel=esriSpatialRelIntersects' +
          '&distance=1000&units=esriSRUnit_Meter' +
          '&returnGeometry=false&returnCountOnly=true&f=json';
        const proxied = PROXY + encodeURIComponent(target);
        console.log('[site] EPA query:', proxied.substring(0, 120));
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        const resp = await fetch(proxied, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await resp.json();
        const count = data.count || 0;
        if (count === 0) return { status: 'pass', detail: 'No Superfund sites within 1km' };
        return { status: 'fail', detail: count + ' Superfund site(s) within 1km' };
      } catch (e) { console.error('[site] EPA failed:', e); return { status: 'unknown', detail: 'Query failed' }; }
    }

    // ── Run all site criteria, update DOM as each completes ──
    async function fetchSiteCriteria(pid) {
      if (siteCache[pid]) return siteCache[pid];
      const entry = parcelStore[pid];
      const centroid = getCentroid(entry.geometry);
      if (!centroid) {
        const fallback = { flood: { status:'unknown', detail:'No geometry' }, roads: { status:'unknown', detail:'No geometry' }, epa: { status:'unknown', detail:'No geometry' } };
        siteCache[pid] = fallback;
        return fallback;
      }

      const result = { flood: null, roads: null, epa: null };

      // Fire all three in parallel, update DOM as each resolves
      const floodP = fetchFloodZone(centroid).then(r => {
        result.flood = r;
        updateSiteRow(pid, 'flood', r);
      });
      const roadsP = fetchRoadAccess(centroid).then(r => {
        result.roads = r;
        updateSiteRow(pid, 'roads', r);
      });
      const epaP = fetchEPASites(centroid).then(r => {
        result.epa = r;
        updateSiteRow(pid, 'epa', r);
      });

      await Promise.allSettled([floodP, roadsP, epaP]);

      if (!result.flood) result.flood = { status:'unknown', detail:'Failed' };
      if (!result.roads) result.roads = { status:'unknown', detail:'Failed' };
      if (!result.epa) result.epa = { status:'unknown', detail:'Failed' };

      siteCache[pid] = result;
      updateOverallBadge(pid);
      return result;
    }

    function statusIcon(status) {
      if (status === 'pass') return '<span class="score-pass">&#10003;</span>';
      if (status === 'fail') return '<span class="score-fail">&#10007;</span>';
      return '<span class="score-warn">?</span>';
    }

    function updateSiteRow(pid, key, result) {
      const el = document.getElementById(`site-${key}-${pid}`);
      if (el) el.innerHTML = statusIcon(result.status) + ' <span style="color:#64748b;font-size:11px;margin-left:4px;">' + esc(result.detail) + '</span>';

    function updateOverallBadge(pid) {
      const entry = parcelStore[pid];
      const p = entry.props;
      const isUnleased = entry.type === 'unleased';
      const site = siteCache[pid] || {};
      let passed = 0;
      if ((p.acres || 0) >= 40) passed++;

      if (isUnleased) passed++;
      if (site.flood && site.flood.status === 'pass') passed++;
      if (site.roads && site.roads.status === 'pass') passed++;
      if (site.epa && site.epa.status === 'pass') passed++;
      const badgeEl = document.getElementById(`score-badge-${pid}`);
      const cls = passed >= 5 ? 'score-badge-green' : passed >= 3 ? 'score-badge-amber' : 'score-badge-red';
      if (badgeEl) badgeEl.innerHTML = `<span class="score-badge ${cls}">${passed}/6 Ready</span>`;
      const drawerBadge = document.getElementById('drawer-score-badge');
      if (drawerBadge) drawerBadge.innerHTML = `<span class="score-badge ${cls}">${passed}/6 Ready</span>`;

    async function fetchAll(label, baseUrl, where, outFields, opts) {
      const useGeom = opts && opts.useGeom;
      const PAGE = 200;
      let allFeatures = [];
      let offset = 0;
      console.log(`[fetchAll] START "${label}" where=${where}`);
      while (true) {
        let target = baseUrl +
          '?where=' + encodeURIComponent(where) +
          '&outSR=4326' +
          '&outFields=' + encodeURIComponent(outFields) +
          '&returnGeometry=true&f=geojson' +
          '&resultOffset=' + offset +
          '&resultRecordCount=' + PAGE;
        if (useGeom) {
          target += '&geometry=-113,33,-111.5,34.2&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects';
        }
        const proxied = PROXY + encodeURIComponent(target);
        console.log(`[fetchAll] "${label}" offset=${offset}`);
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 15000);
          const resp = await fetch(proxied, { signal: controller.signal });
          clearTimeout(timeout);
          if (!resp.ok) { console.error(`[fetchAll] "${label}" HTTP ${resp.status}`); break; }
          const data = await resp.json();
          const count = data.features ? data.features.length : 0;
          console.log(`[fetchAll] "${label}" got ${count} features`);
          if (!data.features || count === 0) break;
          allFeatures = allFeatures.concat(data.features);
          if (count < PAGE) break;
          offset += PAGE;
        } catch (err) {
          console.error(`[fetchAll] "${label}" FAILED:`, err.name === 'AbortError' ? 'Timed out' : err);
          break;
        }
      }
      console.log(`[fetchAll] DONE "${label}" total=${allFeatures.length}`);
      return allFeatures;
    }

        let expiringAcres = 0;
        let criticalCount = 0;
        allLeasedFeatures.forEach(f => {
          const p = f.properties;
          expiringAcres += (p.acres || 0);
          if (isCritical(p.expire_date__c)) criticalCount++;
          const popupHtml = makePopup(p, 'expiring', f);
          const pid = parcelIdCounter - 1;
          const layer = L.geoJSON(f, { style: expiryPolyStyle(p.expire_date__c) }).bindPopup(popupHtml);
          layer.addTo(expiringLayer);
          parcelLayers[pid] = layer;
        });

        setProgress(100, 'Complete');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('stat-unleased').style.display = 'flex';
        document.getElementById('stat-expiring').style.display = 'flex';
        document.getElementById('unleased-count').textContent = unleasedFeatures.length.toLocaleString();
        document.getElementById('unleased-acres').textContent = formatAcres(unleasedAcres);
        document.getElementById('expiring-count').textContent = allLeasedFeatures.length.toLocaleString();
        document.getElementById('critical-count').textContent = criticalCount.toLocaleString();

        buildLegend(unleasedFeatures.length, unleasedAcres, allLeasedFeatures.length, expiringAcres, criticalCount);
        buildSidebar();

        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 600);

      } catch (err) {
        document.getElementById('loading').textContent = 'Error — ' + err.message;
        document.getElementById('loading-detail').textContent = 'Error: ' + err.message;
        document.getElementById('loading-bar').style.background = '#dc2626';
        console.error('[load] FAILED:', err);
      }
    }

    load();
  </script>
</body>
</html>
